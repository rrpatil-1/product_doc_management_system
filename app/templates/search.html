{% extends "base.html" %}

{% block title %}Search Products{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Search Products</h2>
    <p class="subtitle">Find products by searching across name, category, and description</p>
</div>

<form id="search-form" class="search-form">
    <div class="form-group">
        <label for="query">Search Term: <span class="required">*</span></label>
        <input type="text" id="query" name="q" required placeholder="e.g., laptop, electronics, etc.">
    </div>

    <div class="form-group">
        <label for="field">Search In (Optional):</label>
        <select id="field" name="field">
            <option value="">All Fields (name, category, description)</option>
            <option value="name">Product Name</option>
            <option value="category">Category</option>
            <option value="description">Description</option>
        </select>
    </div>

    <div class="form-actions">
        <button type="submit" class="btn btn-primary btn-lg">🔍 Search</button>
        <a href="/" class="btn btn-secondary btn-lg">Back to List</a>
    </div>
</form>

<div id="search-results" class="search-results-container"></div>

<script>
    document.getElementById('search-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const params = new URLSearchParams(formData);
        const url = '/api/v1/products/search/?' + params.toString();

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error('Search failed');
            const products = await response.json();
            displayProducts(products);
        } catch (error) {
            document.getElementById('search-results').innerHTML = '<div class=\"alert alert-error\"><strong>Error:</strong> ' + error.message + '</div>';
        }
    });

    function displayProducts(products) {
        if (products.length === 0) {
            document.getElementById('search-results').innerHTML = '<div class="alert alert-info">No products found matching your search criteria.</div>';
            return;
        }
        let html = '<h3>Search Results (' + products.length + ' found)</h3><table class="products-table"><thead><tr><th>Name</th><th>Category</th><th>Description</th><th>Price</th><th>Discount</th></tr></thead><tbody>';
        products.forEach(product => {
            html += `<tr>
                <td><strong>${product.name}</strong></td>
                <td><span class="badge">${product.category}</span></td>
                <td>${product.description}</td>
                <td class="price">$${product.price.toFixed(2)}</td>
                <td>${product.discount > 0 ? '$' + product.discount.toFixed(2) : '-'}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        document.getElementById('search-results').innerHTML = html;
    }
</script>
{% endblock %}
